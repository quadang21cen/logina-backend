version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: logina_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logina_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logina_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-logina_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongodb:
    image: mongo:6.0
    container_name: logina_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mongo_secure_password}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    container_name: logina_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  mongodata:
  redisdata:
